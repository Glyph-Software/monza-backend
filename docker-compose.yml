version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: sandboxdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d sandboxdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox-service:
    build: .
    privileged: true
    environment:
      DATABASE_URL: postgres://sandbox:secret@postgres:5432/sandboxdb?sslmode=disable
      SERVER_ADDR: ":8080"
      MONZA_AGENT_BIN: "/app/monza-agent"
      MONZA_INIT_SCRIPT: "/app/assets/init"
      MONZA_NETWORK_SUBNET: "172.16.0.0/16"
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
